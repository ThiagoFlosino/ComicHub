name: "CodeQL — Code Scanning"

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]
  schedule:
    # Executa toda segunda-feira às 08:00 UTC para detectar novas vulnerabilidades
    - cron: "0 8 * * 1"

jobs:
  analyze:
    name: Analyze Java
    runs-on: ubuntu-latest

    permissions:
      security-events: write  # publicar alertas em Security → Code scanning
      actions: read
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: java-kotlin
          build-mode: none          # Java não exige compilação para análise CodeQL
          queries: security-extended

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:java-kotlin"
