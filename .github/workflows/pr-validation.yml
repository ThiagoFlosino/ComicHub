name: CI — Build, Quality & Security

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main]

env:
  JAVA_VERSION: "21"
  MAVEN: /tmp/apache-maven-3.9.6/bin/mvn # ajuste se usar setup-java com Maven embutido
  MAVEN_OPTS: "-Xmx1g"

# Cancela runs anteriores do mesmo PR ao receber novo push
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # Job 1 — Build + Testes + Cobertura (JaCoCo)
  # ═══════════════════════════════════════════════════════════════════════════
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: comichub
          POSTGRES_PASSWORD: comichub
          POSTGRES_DB: comichub_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # histórico completo para SonarQube blame

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Build & Test (JaCoCo)
        working-directory: backend
        run: mvn clean verify --no-transfer-progress
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/comichub_test
          SPRING_DATASOURCE_USERNAME: comichub
          SPRING_DATASOURCE_PASSWORD: comichub
          AWS_REGION: us-east-1
          LOCALSTACK_URL: http://localhost:4566 # ignorado em testes unitários

      - name: Upload cobertura JaCoCo
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: backend/target/site/jacoco/
          retention-days: 7

  # ═══════════════════════════════════════════════════════════════════════════
  # Job 2 — SAST: SpotBugs + Find Security Bugs
  # ═══════════════════════════════════════════════════════════════════════════
  spotbugs:
    name: SpotBugs + Find Security Bugs
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Análise SpotBugs
        working-directory: backend
        run: mvn compile spotbugs:check --no-transfer-progress

      - name: Upload relatório SpotBugs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: spotbugs-report
          path: backend/target/spotbugsXml.xml
          retention-days: 7

  # ═══════════════════════════════════════════════════════════════════════════
  # Job 3 — SCA: OWASP Dependency-Check (CVEs nas dependências)
  #
  # Pré-requisito: defina o secret NVD_API_KEY no repositório GitHub.
  # Sem ele o download do NVD leva horas e o job é pulado automaticamente.
  # Obtenha a chave gratuitamente em: https://nvd.nist.gov/developers/request-an-api-key
  # ═══════════════════════════════════════════════════════════════════════════
  owasp-dc:
    name: OWASP Dependency-Check
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Cache banco de dados NVD
        uses: actions/cache@v4
        with:
          path: ~/.dependency-check-data
          key: nvd-db-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            nvd-db-${{ runner.os }}-

      - name: OWASP Dependency-Check
        working-directory: backend
        run: |
          mvn dependency-check:check --no-transfer-progress \
            -DnvdApiKey="${{ secrets.NVD_API_KEY }}"
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}

      - name: Upload relatório OWASP DC
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: owasp-dependency-check-report
          path: backend/target/dependency-check/
          retention-days: 14

  # ═══════════════════════════════════════════════════════════════════════════
  # Job 4 — Qualidade + SAST: SonarQube / SonarCloud
  #
  # Pré-requisito: configurar no repositório GitHub:
  #   Secrets  → SONAR_TOKEN  (token gerado no SonarQube/SonarCloud)
  #   Variables → SONAR_HOST_URL (ex: https://sonarcloud.io  ou  http://seu-servidor:9000)
  #               SONAR_ORGANIZATION (apenas SonarCloud — ex: comichub)
  # ═══════════════════════════════════════════════════════════════════════════
  sonarqube:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    needs: build
    if: ${{ vars.SONAR_HOST_URL != '' }}

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: comichub
          POSTGRES_PASSWORD: comichub
          POSTGRES_DB: comichub_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Build + Test + SonarQube
        working-directory: backend
        run: |
          mvn clean verify sonar:sonar --no-transfer-progress \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }} \
            -Dsonar.host.url=${{ vars.SONAR_HOST_URL }} \
            -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }}
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/comichub_test
          SPRING_DATASOURCE_USERNAME: comichub
          SPRING_DATASOURCE_PASSWORD: comichub
          AWS_REGION: us-east-1
          LOCALSTACK_URL: http://localhost:4566

  # ═══════════════════════════════════════════════════════════════════════════
  # Job 5 — DAST: OWASP ZAP (testa a aplicação em execução)
  #
  # ZAP detecta vulnerabilidades de runtime: XSS, SQL Injection, CSRF,
  # headers de segurança ausentes, endpoints expostos, etc.
  #
  # Pré-requisito: a aplicação precisa subir em modo CI.
  # Configure um profile Spring "ci" que desabilite dependências externas
  # (AWS, LocalStack) usando stubs/no-ops.
  # ═══════════════════════════════════════════════════════════════════════════
  zap-dast:
    name: OWASP ZAP — DAST
    runs-on: ubuntu-latest
    needs: build

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: comichub
          POSTGRES_PASSWORD: comichub
          POSTGRES_DB: comichub_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Build JAR (skip tests)
        working-directory: backend
        run: mvn package -DskipTests --no-transfer-progress

      - name: Iniciar aplicação
        working-directory: backend
        run: |
          nohup java -jar target/*.jar \
            --spring.datasource.url=jdbc:postgresql://127.0.0.1:5432/comichub_test \
            --spring.datasource.username=comichub \
            --spring.datasource.password=comichub \
            --server.port=8080 \
            --localstack.url=http://127.0.0.1:4566 \
            > /tmp/app.log 2>&1 &
          APP_PID=$!

          # Aguarda a aplicação responder (401 num endpoint protegido é suficiente).
          # Usa "|| true" para evitar que curl (exit 7 = connection refused) quebre
          # o script via "set -e" antes de a aplicação estar pronta.
          echo "Aguardando aplicação (PID $APP_PID)..."
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8080/api/v1/wishlists || true)
            if [ "$STATUS" = "401" ]; then
              echo "App pronta (respondeu $STATUS)!"
              break
            fi
            # Aborta cedo se o processo já tiver morrido
            if ! kill -0 "$APP_PID" 2>/dev/null; then
              echo "ERRO: processo da aplicação encerrou inesperadamente. Log:"
              cat /tmp/app.log
              exit 1
            fi
            sleep 2
          done
        env:
          AWS_REGION: us-east-1
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_S3_COVERS_BUCKET: comichub-covers

      - name: OWASP ZAP — Full Scan
        uses: zaproxy/action-full-scan@v0.10.0
        with:
          target: "http://127.0.0.1:8080/api/v1"
          # Alertas >= MEDIUM falham o job. Use fail_action: false para apenas reportar.
          fail_action: true
          cmd_options: "-a -j" # -a: ajax spider, -j: gera JSON
          artifact_name: zap-report

      - name: Upload relatório ZAP
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-report
          path: report_html.html
          retention-days: 14
