services:

  # ─── PostgreSQL (emula Aurora PostgreSQL localmente) ───────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: comichub-postgres
    environment:
      POSTGRES_DB: comichub
      POSTGRES_USER: comichub
      POSTGRES_PASSWORD: comichub
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U comichub -d comichub"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── LocalStack (emula serviços AWS: S3, DynamoDB, SQS, EventBridge, etc.) ─
  localstack:
    image: localstack/localstack:3.8
    container_name: comichub-localstack
    environment:
      - SERVICES=s3,dynamodb,sqs,events,secretsmanager
      - DEFAULT_REGION=us-east-1
      - LOCALSTACK_HOST=localstack
      - PERSISTENCE=1
      - DEBUG=0
    ports:
      - "4566:4566"
    volumes:
      - localstack-data:/var/lib/localstack
      - ./infra/localstack/init:/etc/localstack/init/ready.d:ro
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # ─── Backend Spring Boot ────────────────────────────────────────────────────
  # Descomente após criar o módulo backend com seu Dockerfile.
  # backend:
  #   build:
  #     context: ./backend
  #     dockerfile: Dockerfile
  #   container_name: comichub-backend
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     localstack:
  #       condition: service_healthy
  #   env_file:
  #     - ./backend/.env.local
  #   environment:
  #     SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/comichub
  #     SPRING_DATASOURCE_USERNAME: comichub
  #     SPRING_DATASOURCE_PASSWORD: comichub
  #     AWS_REGION: us-east-1
  #     AWS_ACCESS_KEY_ID: test
  #     AWS_SECRET_ACCESS_KEY: test
  #     LOCALSTACK_URL: http://localstack:4566
  #   ports:
  #     - "8080:8080"
  #   restart: unless-stopped

volumes:
  postgres-data:
    name: comichub-postgres-data
  localstack-data:
    name: comichub-localstack-data

networks:
  default:
    name: comichub-network
